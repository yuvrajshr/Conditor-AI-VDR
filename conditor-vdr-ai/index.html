<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conditor Capital — VDR Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#0c241d; --g800:#103027; --g700:#163f33; --g600:#1d5142; --g500:#276b56; --g400:#3f8b73;
  --gold:#c2a14d; --gold2:#d4b76a; --gold-dim:#9c7e34;
  --gold-gradient:linear-gradient(135deg,#c2a14d 0%,#d4b76a 100%);
  --bg:#eceee9; --bg2:#e3e7e0; --card:#ffffff; --card2:#f6f8f4;
  --ink:#15201c; --text:#1f2a26; --muted:#5c665f; --faint:#8a938c;
  --line:#dadfd7; --line2:#c7cfc3;
  --red:#a23a33; --red-bg:#f6e6e3; --red-line:#e3c3bd;
  --amber:#9a7320; --amber-bg:#f6eed6; --amber-line:#e4d3a4;
  --green:#2f6b4f; --green-bg:#e2efe6; --green-line:#bcd9c5;
  --blue:#2f5a78; --blue-bg:#e1ebf2; --blue-line:#bcd1e0;
  --shadow:0 1px 2px rgba(12,36,29,.04),0 4px 12px rgba(12,36,29,.06);
  --shadow-card:0 1px 3px rgba(12,36,29,.04),0 8px 24px rgba(12,36,29,.07);
  --shadow-hover:0 4px 12px rgba(12,36,29,.08),0 16px 40px rgba(12,36,29,.12);
  --shadow-lg:0 24px 60px rgba(12,36,29,.3);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',-apple-system,system-ui,sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle,rgba(39,107,86,.07) 1px,transparent 1px);
  background-size:28px 28px;
  color:var(--text);font-size:14.5px;line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.005em;
}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::selection{background:var(--g500);color:#fff}
a{color:var(--g600)}

/* ---------- shell ---------- */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  background:linear-gradient(180deg,#122e25 0%,#0c241d 100%);color:#eef3ef;display:flex;align-items:center;
  padding:0 24px;height:64px;gap:16px;flex-shrink:0;
  border-bottom:1.5px solid var(--gold);
  box-shadow:0 1px 0 rgba(194,161,77,.15),0 4px 20px rgba(12,36,29,.4);
  position:relative;z-index:40;
}
.brand{display:flex;align-items:center;gap:14px}
.mark{width:88px;height:50px;flex-shrink:0;position:relative}
.brand-sep{width:1px;height:28px;background:rgba(194,161,77,.25);flex-shrink:0}
.brand .tag{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#7a9d8d;font-weight:700}

.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.provider{
  font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#9db4a8;
  border:1px solid rgba(157,180,168,.25);padding:5px 11px;border-radius:6px;font-weight:600;
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(4px);
}
.provider .d{width:6px;height:6px;border-radius:50%;background:var(--gold2);animation:pulse 3s ease-in-out infinite}

.connect{
  display:flex;align-items:center;gap:9px;
  background:var(--gold-gradient);color:#231c06;font-weight:700;
  padding:8px 16px;border-radius:7px;font-size:12.5px;letter-spacing:.02em;
  transition:all .18s cubic-bezier(.2,.7,.3,1);
  border:1px solid transparent;
  box-shadow:0 2px 8px rgba(194,161,77,.3);
}
.connect:hover{background:linear-gradient(135deg,#d4b76a 0%,#e8cc82 100%);transform:translateY(-2px);box-shadow:0 4px 16px rgba(194,161,77,.4)}
.connect:active{transform:translateY(0);box-shadow:0 1px 4px rgba(194,161,77,.2)}
.connect svg{width:16px;height:16px;transition:transform .18s}
.connect:hover svg{transform:scale(1.1)}
.connect.linked{background:rgba(47,107,79,.18);color:#cfeadd;border-color:rgba(47,107,79,.45);box-shadow:none}
.connect.linked:hover{background:rgba(47,107,79,.28);transform:none;box-shadow:none}

/* ---------- body split ---------- */
.body{display:flex;flex:1;overflow:hidden}
.side{
  width:336px;flex-shrink:0;
  background:linear-gradient(180deg,#ffffff 0%,#fafcf9 100%);
  border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;
}
.side-head{padding:16px 17px 14px;border-bottom:1px solid var(--line)}
.src-tag{
  display:inline-flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:12px;
}
.src-tag.demo{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-line)}
.src-tag.drive{background:var(--green-bg);color:var(--green);border:1px solid var(--green-line)}
.src-tag svg{width:12px;height:12px}
.side-head h2{font-size:16px;font-weight:700;line-height:1.25;color:var(--ink);letter-spacing:-.01em}
.side-head .room-meta{font-size:11px;color:var(--faint);margin-top:3px;font-family:'IBM Plex Mono',monospace}

.folder-load{margin-top:11px;display:none}
.folder-load.show{display:block}
.folder-load input{width:100%;padding:8px 11px;border:1px solid var(--line2);border-radius:6px;font-size:12px;background:var(--card2);transition:border-color .15s,box-shadow .15s}
.folder-load input:focus{outline:none;border-color:var(--g500);box-shadow:0 0 0 3px rgba(39,107,86,.12)}
.folder-load .fl-row{display:flex;gap:7px;margin-top:7px}
.folder-load button{flex:1;font-size:12px;padding:7px;border-radius:6px;background:var(--g700);color:#eef3ef;font-weight:600;transition:background .15s}
.folder-load button:hover{background:var(--g600)}
.folder-load button.sec{background:var(--card2);color:var(--g700);border:1px solid var(--line2)}
.folder-load button.sec:hover{background:var(--bg2)}

.search{margin-top:11px;position:relative}
.search input{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--line2);border-radius:7px;background:var(--card2);font-size:12.5px;transition:border-color .15s,box-shadow .15s}
.search input:focus{outline:none;border-color:var(--g500);box-shadow:0 0 0 3px rgba(39,107,86,.12)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--faint)}

.tree{flex:1;overflow-y:auto;padding:8px 8px 24px}
.tree::-webkit-scrollbar{width:8px}
.tree::-webkit-scrollbar-thumb{background:rgba(194,161,77,.25);border-radius:6px;border:2px solid var(--card)}
.tree::-webkit-scrollbar-thumb:hover{background:rgba(194,161,77,.4)}
.row{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);user-select:none;position:relative;transition:background .12s ease}
.row:hover{background:var(--bg2)}
.row.sel{background:linear-gradient(135deg,var(--g700) 0%,var(--g600) 100%);color:#eef3ef;box-shadow:inset 3px 0 0 var(--gold)}
.row.sel .meta{color:#9db4a8}
.row.flagged::after{content:'';position:absolute;right:10px;width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s ease-in-out infinite}
.row.sel.flagged::after{background:var(--gold2)}
.row .tw{width:13px;display:flex;justify-content:center;flex-shrink:0;color:var(--faint);transition:transform .18s cubic-bezier(.2,.7,.3,1)}
.row.open .tw{transform:rotate(90deg)}
.row .ic{width:17px;height:17px;flex-shrink:0;display:flex}
.row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{font-size:9.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.tree-loading{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px}

/* ---------- work area ---------- */
.work{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tabs{display:flex;gap:2px;padding:10px 20px 0;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto}
.tab{padding:9px 15px;font-size:12.5px;color:var(--muted);border-radius:7px 7px 0 0;white-space:nowrap;display:flex;align-items:center;gap:7px;border:1px solid transparent;border-bottom:none;position:relative;top:1px;font-weight:600;transition:color .15s,background .15s}
.tab:hover{color:var(--ink);background:var(--bg2)}
.tab.active{color:var(--g700);background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-color:var(--line)}
.tab.active::after{content:'';position:absolute;left:4px;right:4px;bottom:-1px;height:3px;background:var(--gold-gradient);border-radius:2px 2px 0 0}
.tab svg{width:15px;height:15px}
.tab .badge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-weight:600;animation:pulse 2s ease-in-out infinite}

.canvas{flex:1;overflow-y:auto;padding:28px 32px 70px}
.canvas::-webkit-scrollbar{width:10px}
.canvas::-webkit-scrollbar-thumb{background:rgba(194,161,77,.25);border-radius:6px;border:3px solid var(--bg)}
.canvas::-webkit-scrollbar-thumb:hover{background:rgba(194,161,77,.4)}
.view{max-width:900px;margin:0 auto;animation:rise .35s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.page-h{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.page-h .eyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.page-h .eyebrow svg{width:14px;height:14px;flex-shrink:0}
.page-h h2{font-size:27px;font-weight:800;line-height:1.1;letter-spacing:-.025em;color:var(--ink)}
.page-h p{color:var(--muted);font-size:13.5px;margin-top:8px;max-width:640px;line-height:1.6}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:22px 24px;margin-bottom:16px;
  box-shadow:var(--shadow-card);
  transition:box-shadow .2s ease,transform .2s ease;
  animation:slideIn .25s ease both;
}
.card:hover{box-shadow:var(--shadow-hover)}
.card h3{
  font-size:15px;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:9px;color:var(--ink);letter-spacing:-.01em;
  padding-bottom:11px;border-bottom:1px solid var(--line);
}
.card h3 svg{width:16px;height:16px;flex-shrink:0}
.card h3 .num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--gold-dim);border:1px solid var(--line2);border-radius:5px;padding:2px 7px;font-weight:600}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:7px;
  font-size:13px;font-weight:700;background:var(--g700);color:#eef3ef;
  transition:all .18s cubic-bezier(.2,.7,.3,1);border:1px solid var(--g700);letter-spacing:.02em;
}
.btn:hover{background:var(--g600);transform:translateY(-2px);box-shadow:0 6px 18px rgba(12,36,29,.2)}
.btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(12,36,29,.12)}
.btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btn.gold{background:var(--gold-gradient);border-color:var(--gold);color:#1a1200;box-shadow:0 2px 8px rgba(194,161,77,.3)}
.btn.gold:hover{background:linear-gradient(135deg,#d4b76a 0%,#e8cc82 100%);box-shadow:0 4px 16px rgba(194,161,77,.4);transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--g700);border:1px solid var(--line2)}
.btn.ghost:hover{background:var(--bg2);border-color:var(--line);box-shadow:none}
.btn svg{width:15px;height:15px;transition:transform .18s}
.btn:hover svg{transform:translateX(2px)}
.btn.gold:hover svg,.btn.ghost:hover svg{transform:translateX(2px)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .ill{
  width:76px;height:76px;margin:0 auto 20px;
  border:1px solid var(--line2);border-radius:16px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  color:var(--g500);box-shadow:var(--shadow-card);
}
.empty .ill svg{width:30px;height:30px}
.empty h3{font-size:19px;color:var(--ink);margin-bottom:9px;font-weight:700}
.empty p{max-width:400px;margin:0 auto;font-size:13.5px;opacity:.75}

.ai-out{
  background:linear-gradient(to right,rgba(194,161,77,.04) 0%,var(--card2) 50%,var(--card2) 100%);
  border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:0 9px 9px 0;padding:18px 22px;margin-top:14px;font-size:14px;line-height:1.68;
}
.ai-out h4{font-size:13.5px;font-weight:700;margin:18px 0 8px;color:var(--g700);display:flex;align-items:center;gap:8px}
.ai-out h4::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.ai-out h4:first-child{margin-top:0}
.ai-out ul{margin:6px 0 6px 2px;list-style:none}
.ai-out li{padding-left:18px;position:relative;margin-bottom:7px}
.ai-out li::before{content:'';position:absolute;left:3px;top:9px;width:5px;height:5px;background:var(--gold);border-radius:50%}
.ai-out strong{color:var(--g700);font-weight:700}
.ai-out p{margin-bottom:9px}
.ai-out code{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--bg2);padding:2px 6px;border-radius:4px;border:1px solid var(--line)}
.ai-src{
  font-size:10.5px;font-family:'IBM Plex Mono',monospace;margin-top:14px;padding-top:11px;
  border-top:1px dashed var(--line2);display:flex;align-items:center;gap:7px;
}
.ai-src svg{width:13px;height:13px}
.ai-src.live{color:var(--green);font-weight:600}
.ai-src.demo{color:var(--amber)}

.spinner{display:inline-flex;align-items:center;gap:11px;color:var(--muted);font-size:13px;padding:8px 0}
.spinner .ring{width:18px;height:18px;border:2.5px solid var(--line2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
.thinking{font-style:italic;letter-spacing:.01em}

table.fin{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
table.fin th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1.5px solid var(--line2);background:var(--card2)}
table.fin td{padding:9px 12px;border-bottom:1px solid var(--line);transition:background .1s}
table.fin tr:hover td{background:rgba(39,107,86,.03)}
table.fin tr.total:hover td{background:linear-gradient(to right,rgba(22,63,51,.08),rgba(22,63,51,.04))}
table.fin td.num{text-align:right;font-family:'IBM Plex Mono',monospace}
table.fin tr.total td{font-weight:700;border-top:1.5px solid var(--g700);border-bottom:none;background:linear-gradient(to right,rgba(22,63,51,.06),transparent)}
table.fin tr.addback td{color:var(--green)}
table.fin tr.addback td:first-child{padding-left:24px}

.flag{display:flex;gap:13px;padding:14px 16px;border-radius:9px;margin-bottom:11px;border:1px solid;border-left-width:3px;align-items:flex-start;transition:box-shadow .18s,transform .18s;animation:slideIn .25s ease both}
.flag:hover{box-shadow:0 4px 18px rgba(12,36,29,.1);transform:translateY(-1px)}
.flag.high{background:var(--red-bg);border-color:var(--red-line);border-left-color:var(--red)}
.flag.med{background:var(--amber-bg);border-color:var(--amber-line);border-left-color:var(--amber)}
.flag.low{background:var(--blue-bg);border-color:var(--blue-line);border-left-color:var(--blue)}
.flag .sev{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:5px;flex-shrink:0;font-weight:600;margin-top:1px;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.flag.high .sev{background:var(--red);color:#fff}.flag.med .sev{background:var(--amber);color:#fff}.flag.low .sev{background:var(--blue);color:#fff}
.flag .ftxt{flex:1}.flag .ftxt b{display:block;margin-bottom:4px;font-size:13.5px;color:var(--ink)}
.flag .ftxt span{font-size:13px;color:var(--muted);line-height:1.55}
.flag .floc{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--faint);margin-top:6px;display:block}
.flag .jump{margin-top:9px}

.recon-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:4px}
.recon-col{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:14px;min-height:120px;transition:box-shadow .18s}
.recon-col:hover{box-shadow:0 4px 16px rgba(12,36,29,.08)}
.recon-col h4{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;font-weight:700}
.recon-col .cnt{border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
.recon-col.ok h4{color:var(--green)} .recon-col.ok .cnt{background:var(--green-bg);color:var(--green)}
.recon-col.miss h4{color:var(--red)} .recon-col.miss .cnt{background:var(--red-bg);color:var(--red)}
.recon-col.extra h4{color:var(--blue)} .recon-col.extra .cnt{background:var(--blue-bg);color:var(--blue)}
.recon-item{font-size:12px;padding:6px 9px;background:var(--card);border:1px solid var(--line);border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:7px;transition:background .12s}
.recon-item:hover{background:var(--bg2)}
.recon-item svg{width:13px;height:13px;flex-shrink:0}
.recon-item .cat{margin-left:auto;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--faint)}
.checklist-edit{width:100%;min-height:120px;padding:12px;border:1px solid var(--line2);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--card2);line-height:1.6;resize:vertical;transition:border-color .15s,box-shadow .15s}
.checklist-edit:focus{outline:none;border-color:var(--g500);box-shadow:0 0 0 3px rgba(39,107,86,.12)}

.chat-log{display:flex;flex-direction:column;gap:14px;margin-bottom:16px;padding:4px 0}
.msg{display:flex;gap:12px;max-width:94%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .av{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-size:10px;font-weight:800;letter-spacing:.04em;box-shadow:0 2px 6px rgba(12,36,29,.15)}
.msg.ai .av{background:linear-gradient(135deg,var(--g700),var(--g600));color:var(--gold2)}
.msg.user .av{background:var(--gold-gradient);color:#231c06}
.msg .bubble{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.62;box-shadow:0 1px 4px rgba(12,36,29,.06)}
.msg.ai .bubble{border-left:2px solid var(--gold)}
.msg.user .bubble{background:linear-gradient(135deg,var(--g700),var(--g600));color:#eef3ef;border-color:transparent}
.msg .bubble .jump{margin-top:9px}
.jump{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gold-dim);border:1px solid var(--line2);border-radius:7px;padding:5px 11px;background:var(--card);transition:all .18s;font-weight:600}
.jump:hover{background:var(--gold-gradient);color:#1a1200;border-color:transparent;box-shadow:0 2px 8px rgba(194,161,77,.3)}
.jump svg{width:13px;height:13px;transition:transform .18s}
.jump:hover svg{transform:translateX(2px)}
.chat-input{display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg);padding-top:8px;box-shadow:0 -4px 18px rgba(12,36,29,.06)}
.chat-input input{flex:1;padding:12px 16px;border:1px solid var(--line2);border-radius:10px;background:var(--card);font-size:14px;transition:border-color .15s,box-shadow .15s}
.chat-input input:focus{outline:none;border-color:var(--g500);box-shadow:0 0 0 3px rgba(39,107,86,.12)}
.suggest{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:12px;padding:7px 13px;border:1px solid var(--line2);border-radius:20px;color:var(--muted);background:var(--card);transition:all .18s;font-weight:600}
.chip:hover{border-color:var(--gold);color:var(--g700);background:var(--bg2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(194,161,77,.15)}

.doc-paper{background:#fff;border:1px solid var(--line);border-radius:9px;padding:24px 28px;box-shadow:var(--shadow-card);font-size:12.5px;line-height:1.72;white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;color:#2a342f;overflow-x:auto;max-height:420px;overflow-y:auto}
.doc-bar{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
.doc-bar .ic{width:19px;height:19px}
.doc-bar .fname{font-size:17px;font-weight:700;color:var(--ink)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 17px;box-shadow:var(--shadow-card);transition:box-shadow .2s,transform .2s;animation:slideIn .25s ease both}
.stat:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.stat .k{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-weight:600}
.stat .v{font-size:28px;font-weight:800;margin-top:6px;line-height:1;color:var(--ink);letter-spacing:-.025em;font-variant-numeric:tabular-nums}
.stat .v.red{color:var(--red)} .stat .v.amber{color:var(--amber)} .stat .v.green{color:var(--green)} .stat .v.sm{font-size:17px}
.stat .d{font-size:11px;color:var(--faint);margin-top:5px}

.tmpl-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.tmpl-opt{display:flex;align-items:center;gap:12px;padding:12px 15px;border:1px solid var(--line);border-radius:9px;background:var(--card2);cursor:pointer;transition:all .18s}
.tmpl-opt:hover{border-color:var(--gold);background:var(--bg2);box-shadow:0 2px 10px rgba(194,161,77,.15)}
.tmpl-opt.sel{border-color:var(--gold);background:var(--bg2);box-shadow:0 0 0 2.5px rgba(194,161,77,.2)}
.tmpl-opt .ti{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--g700),var(--g600));color:var(--gold2);display:grid;place-items:center;flex-shrink:0;box-shadow:0 2px 6px rgba(12,36,29,.15)}
.tmpl-opt .ti svg{width:16px;height:16px}
.tmpl-opt .tt{flex:1}.tmpl-opt .tt b{font-size:13px;display:block;color:var(--ink)}.tmpl-opt .tt span{font-size:11px;color:var(--muted)}

.note{font-size:12px;color:var(--muted);background:var(--bg2);border-radius:8px;padding:11px 14px;display:flex;gap:10px;align-items:flex-start;margin-top:13px;border:1px solid var(--line)}
.note svg{width:15px;height:15px;flex-shrink:0;color:var(--gold-dim);margin-top:1px}
.err{font-size:13px;color:var(--red);background:var(--red-bg);border:1px solid var(--red-line);border-left:3px solid var(--red);border-radius:8px;padding:11px 14px;margin-top:12px}

/* Connect modal */
.modal-bg{position:fixed;inset:0;background:rgba(12,36,29,.6);backdrop-filter:blur(6px) brightness(.9);z-index:100;display:grid;place-items:center;padding:20px;animation:rise .2s}
.modal{background:var(--card);border-radius:16px;max-width:520px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--line)}
.modal-h{background:linear-gradient(160deg,var(--g600) 0%,var(--g800) 100%);color:#eef3ef;padding:22px 26px;border-bottom:1px solid rgba(194,161,77,.2)}
.modal-h h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.modal-h p{font-size:12.5px;color:#acc3b7;margin-top:6px;line-height:1.55}
.modal-b{padding:24px 26px}
.modal-b ol{margin:0 0 4px 18px;font-size:13px;line-height:1.72}
.modal-b ol li{margin-bottom:9px}
.modal-b code{font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--g700);border:1px solid var(--line)}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:0 26px 24px}
.x{margin-left:auto;cursor:pointer;color:#acc3b7;font-size:22px;line-height:1;transition:color .15s}
.x:hover{color:#eef3ef}

@media(max-width:1080px){.side{width:280px}.stats{grid-template-columns:repeat(2,1fr)}.recon-grid{grid-template-columns:1fr}}

/* ---------- Onboarding Tour ---------- */
.tour-launch{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:600;color:#9db4a8;
  border:1px solid rgba(157,180,168,.25);padding:6px 13px;border-radius:7px;
  background:rgba(255,255,255,.04);transition:all .18s;letter-spacing:.02em;
}
.tour-launch:hover{color:#eef3ef;border-color:rgba(194,161,77,.4);background:rgba(194,161,77,.08)}
.tour-launch svg{width:15px;height:15px;flex-shrink:0}

.tour-spotlight{
  position:fixed;border-radius:10px;
  box-shadow:0 0 0 9999px rgba(12,36,29,.75);
  z-index:200;pointer-events:none;
  border:2px solid rgba(194,161,77,.65);
  transition:top .22s cubic-bezier(.2,.7,.3,1),left .22s cubic-bezier(.2,.7,.3,1),width .22s cubic-bezier(.2,.7,.3,1),height .22s cubic-bezier(.2,.7,.3,1);
}
.tour-center-bg{
  position:fixed;inset:0;background:rgba(12,36,29,.75);z-index:200;pointer-events:all;
}
.tour-tip{
  position:fixed;background:var(--card);border-radius:14px;
  padding:22px 24px 18px;
  box-shadow:0 24px 60px rgba(12,36,29,.45),0 4px 16px rgba(12,36,29,.2);
  border:1px solid var(--line);z-index:202;
  animation:rise .22s cubic-bezier(.2,.7,.3,1);
}
.tour-tip.center{
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:460px;max-width:calc(100vw - 32px);
}
.tour-tip.arrow-top::before{
  content:'';position:absolute;bottom:100%;left:var(--arrow-left,50%);transform:translateX(-50%);
  border:9px solid transparent;border-bottom-color:var(--card);
}
.tour-tip.arrow-left::before{
  content:'';position:absolute;right:100%;top:22px;
  border:9px solid transparent;border-right-color:var(--card);
}
.tour-tip.arrow-right::before{
  content:'';position:absolute;left:100%;top:22px;
  border:9px solid transparent;border-left-color:var(--card);
}
.tour-tip.arrow-bottom::before{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:9px solid transparent;border-top-color:var(--card);
}
.tour-welcome-icon{
  width:52px;height:52px;border-radius:13px;
  background:linear-gradient(135deg,var(--g700),var(--g600));
  display:grid;place-items:center;color:var(--gold2);
  margin-bottom:16px;box-shadow:0 4px 14px rgba(12,36,29,.25);
}
.tour-welcome-icon svg{width:26px;height:26px}
.tour-eyebrow{
  font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold-dim);font-weight:700;margin-bottom:8px;
  display:flex;align-items:center;gap:7px;
}
.tour-eyebrow::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--gold)}
.tour-title{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.2;margin-bottom:10px}
.tour-body{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:18px}
.tour-progress{height:3px;background:var(--line2);border-radius:2px;margin-bottom:14px;overflow:hidden}
.tour-progress-bar{height:100%;background:var(--gold-gradient);border-radius:2px;transition:width .3s cubic-bezier(.2,.7,.3,1)}
.tour-btns{display:flex;align-items:center;gap:8px}
.tour-counter{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--faint);margin-right:auto}
.tour-btn{
  font-family:inherit;cursor:pointer;border:none;
  font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:7px;
  transition:all .18s cubic-bezier(.2,.7,.3,1);
}
.tour-btn.prim{
  background:var(--gold-gradient);color:#1a1200;
  border:1px solid var(--gold);box-shadow:0 2px 8px rgba(194,161,77,.3);
}
.tour-btn.prim:hover{background:linear-gradient(135deg,#d4b76a 0%,#e8cc82 100%);transform:translateY(-1px);box-shadow:0 4px 14px rgba(194,161,77,.4)}
.tour-btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--line2)}
.tour-btn.sec:hover{background:var(--bg2)}
.tour-btn.skip{background:transparent;color:var(--muted);padding:8px 10px;font-weight:600}
.tour-btn.skip:hover{color:var(--ink)}
</style>
